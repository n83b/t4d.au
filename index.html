<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="tfd-icon.png">
	<title>Websites for Dads - Programming Notes</title>
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			line-height: 1.6;
			color: #333;
			max-width: 800px;
			margin: 0 auto;
			padding: 2rem 1rem;
			background-color: #fdfdfd;
		}
		header {
			border-bottom: 2px solid #eee;
			padding-bottom: 1rem;
			margin-bottom: 2rem;
		}
		.header-inner {
			display: flex;
			align-items: center;
			gap: 0.75rem;
		}
		.site-logo {
			height: 2.5rem;
			width: auto;
		}
		h1, h2, h3 { color: #111; }
		
		.note-entry {
			margin-bottom: 4rem;
			border-bottom: 1px dashed #eee;
			padding-bottom: 2rem;
		}
		.note-date {
			font-size: 0.9rem;
			color: #888;
			margin-top: -0.5rem;
			margin-bottom: 1.5rem;
		}
		
		/* Code Styling */
		code {
			font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
			background-color: #f4f4f4;
			padding: 0.2rem 0.4rem;
			border-radius: 4px;
			font-size: 0.9em;
		}
		pre {
			background-color: #f4f4f4;
			padding: 1rem;
			border-radius: 6px;
			overflow-x: auto;
			border: 1px solid #ddd;
		}
		pre code { background-color: transparent; padding: 0; }
		footer { margin-top: 4rem; border-top: 1px solid #eee; padding-top: 1rem; font-size: 0.9rem; color: #666; }

		/* ── Dark mode ── */
		@media (prefers-color-scheme: dark) {
			body {
				background-color: #0d0d0d;
				color: #d4d4d4;
			}
			header {
				border-bottom-color: #2a2a2a;
			}
			h1, h2, h3 { color: #f0f0f0; }
			.note-entry {
				border-bottom-color: #2a2a2a;
			}
			.note-date { color: #777; }
			code {
				background-color: #1e1e1e;
				color: #d4d4d4;
			}
			pre {
				background-color: #1e1e1e;
				border-color: #2a2a2a;
				color: #d4d4d4;
			}
			footer {
				border-top-color: #2a2a2a;
				color: #666;
			}
			a { color: #7db8f7; }
			a:visited { color: #b394f0; }
		}
	</style>

	<script type="module">
		import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';

		async function loadNotes() {
			const container = document.getElementById('notes-container');
			
			try {
				// 1. Fetch the index listing of your files
				const response = await fetch('index.json');
				const notes = await response.json();

				// 2. Sort entries by date descending (Newest first)
				notes.sort((a, b) => new Date(b.date) - new Date(a.date));

				// 3. Loop through the sorted files, fetch their text, and render them
				for (const note of notes) {
					const fileResponse = await fetch(`notes/${note.filename}`);
					if (!fileResponse.ok) continue; // Skip if file doesn't exist
					
					const markdownText = await fileResponse.text();
					
					// Convert markdown structure to native HTML strings
					const htmlContent = marked.parse(markdownText);

					// Create a semantic article shell for the note
					const article = document.createElement('article');
					article.className = 'note-entry';
					
					// Inject a structured date badge and the parsed content
					article.innerHTML = `
						<div class="note-date">Published on: ${note.date}</div>
						<div class="note-content">${htmlContent}</div>
					`;
					
					container.appendChild(article);
				}
			} catch (error) {
				container.innerHTML = `<p>Error loading notes. Ensure you are running a local web server.</p>`;
				console.error('Error fetching or processing notes:', error);
			}
		}

		// Initialise when the DOM is safely loaded
		document.addEventListener('DOMContentLoaded', loadNotes);
	</script>
</head>
<body>

	<header>
		<div class="header-inner">
			<img src="tfd-icon.png" alt="T4D logo" class="site-logo">
			<h1>Programming Notes</h1>
		</div>
		<p>A running log of snippets and technical discoveries.</p>
	</header>

	<main id="notes-container">
		<p>Loading entries...</p>
	</main>

	<footer>
		<p>&copy; 2026 Personal Dev Notes.</p>
	</footer>

</body>
</html>
