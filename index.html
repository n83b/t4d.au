<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="tfd-icon.png">
	<title>Websites for Dads - Programming Notes</title>
	<style>
		/* ── Reset & base ── */
		*, *::before, *::after { box-sizing: border-box; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			line-height: 1.6;
			color: #333;
			background-color: #fdfdfd;
			margin: 0;
			padding: 0;
		}

		/* ── Page shell ── */
		.page-header {
			border-bottom: 2px solid #eee;
			padding: 1rem 1.5rem;
		}
		.header-inner {
			display: flex;
			align-items: center;
			gap: 0.75rem;
		}
		.site-logo {
			height: 2.5rem;
			width: auto;
		}
		.page-header h1 {
			margin: 0;
			font-size: 1.4rem;
			color: #111;
		}
		.page-header p {
			margin: 0.25rem 0 0;
			font-size: 0.9rem;
			color: #666;
		}

		/* ── Two-column layout ── */
		.layout {
			display: flex;
			align-items: flex-start;
			max-width: 1100px;
			margin: 0 auto;
		}

		/* ── Sidebar ── */
		.sidebar {
			width: 240px;
			flex-shrink: 0;
			position: sticky;
			top: 0;
			height: 100vh;
			overflow-y: auto;
			border-right: 1px solid #eee;
			padding: 1.5rem 1rem;
		}
		.sidebar-title {
			font-size: 0.7rem;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #999;
			margin: 0 0 0.75rem 0.25rem;
		}
		.sidebar-nav {
			list-style: none;
			margin: 0;
			padding: 0;
		}
		.sidebar-nav li + li {
			margin-top: 0.15rem;
		}
		.sidebar-nav a {
			display: block;
			padding: 0.45rem 0.6rem;
			border-radius: 6px;
			text-decoration: none;
			font-size: 0.875rem;
			color: #444;
			transition: background 0.15s, color 0.15s;
		}
		.sidebar-nav a:hover {
			background: #f0f0f0;
			color: #111;
		}
		.sidebar-nav a.active {
			background: #e8f0fe;
			color: #1a56db;
			font-weight: 600;
		}
		.sidebar-nav .nav-date {
			display: block;
			font-size: 0.75rem;
			color: #aaa;
			margin-top: 0.1rem;
		}

		/* ── Main content ── */
		main {
			flex: 1;
			min-width: 0;
			padding: 2rem 2.5rem;
			max-width: 800px;
		}

		/* ── Note entries ── */
		.note-entry {
			margin-bottom: 4rem;
			border-bottom: 1px dashed #eee;
			padding-bottom: 2rem;
			scroll-margin-top: 1.5rem;
		}
		.note-entry:last-child {
			border-bottom: none;
		}
		.note-date {
			font-size: 0.85rem;
			color: #888;
			margin-top: -0.25rem;
			margin-bottom: 1.5rem;
		}
		h2, h3 { color: #111; }

		/* ── Code ── */
		code {
			font-family: "SF Mono", SFMono-Regular, Consolas, monospace;
			background-color: #f4f4f4;
			padding: 0.2rem 0.4rem;
			border-radius: 4px;
			font-size: 0.9em;
		}
		pre {
			background-color: #f4f4f4;
			padding: 1rem;
			border-radius: 6px;
			overflow-x: auto;
			border: 1px solid #ddd;
		}
		pre code { background-color: transparent; padding: 0; }

		/* ── Footer ── */
		footer {
			margin-top: 4rem;
			border-top: 1px solid #eee;
			padding: 1rem 2.5rem;
			font-size: 0.9rem;
			color: #666;
		}

		/* ── Responsive: collapse sidebar on small screens ── */
		@media (max-width: 700px) {
			.layout { flex-direction: column; }
			.sidebar {
				width: 100%;
				height: auto;
				position: static;
				border-right: none;
				border-bottom: 1px solid #eee;
				padding: 1rem;
			}
			main { padding: 1.5rem 1rem; }
		}

		/* ── Dark mode ── */
		@media (prefers-color-scheme: dark) {
			body { background-color: #0d0d0d; color: #d4d4d4; }
			.page-header { border-bottom-color: #2a2a2a; }
			.page-header h1, h2, h3 { color: #f0f0f0; }
			.page-header p { color: #777; }
			.sidebar { border-right-color: #2a2a2a; }
			.sidebar-title { color: #555; }
			.sidebar-nav a { color: #bbb; }
			.sidebar-nav a:hover { background: #1e1e1e; color: #f0f0f0; }
			.sidebar-nav a.active { background: #1a2a4a; color: #7db8f7; }
			.sidebar-nav .nav-date { color: #555; }
			.note-entry { border-bottom-color: #2a2a2a; }
			.note-date { color: #777; }
			code { background-color: #1e1e1e; color: #d4d4d4; }
			pre { background-color: #1e1e1e; border-color: #2a2a2a; color: #d4d4d4; }
			footer { border-top-color: #2a2a2a; color: #555; }
			a { color: #7db8f7; }
			a:visited { color: #b394f0; }
		}
	</style>

	<script type="module">
		import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';

		async function loadNotes() {
			const container = document.getElementById('notes-container');
			const navList   = document.getElementById('sidebar-nav');

			try {
				// 1. Fetch the index listing of your files
				const response = await fetch('index.json');
				const notes = await response.json();

				// 2. Sort entries by date descending (newest first)
				notes.sort((a, b) => new Date(b.date) - new Date(a.date));

				// 3. Build sidebar links and article elements together
				for (const note of notes) {
					const fileResponse = await fetch(`notes/${note.filename}`);
					if (!fileResponse.ok) continue;

					const markdownText = await fileResponse.text();
					const htmlContent  = marked.parse(markdownText);

					// Unique anchor ID derived from filename (strip extension)
					const slug = note.filename.replace(/\.md$/, '');

					// ── Sidebar entry ──
					const li = document.createElement('li');
					li.innerHTML = `
						<a href="#${slug}" data-slug="${slug}">
							${note.title}
							<span class="nav-date">${note.date}</span>
						</a>
					`;
					navList.appendChild(li);

					// ── Article ──
					const article = document.createElement('article');
					article.className = 'note-entry';
					article.id = slug;
					article.innerHTML = `
						<div class="note-date">Published on: ${note.date}</div>
						<div class="note-content">${htmlContent}</div>
					`;
					container.appendChild(article);
				}

				// 4. Highlight active sidebar link using IntersectionObserver
				const articles = container.querySelectorAll('.note-entry');
				const navLinks  = navList.querySelectorAll('a');

				const observer = new IntersectionObserver(
					(entries) => {
						entries.forEach(entry => {
							if (entry.isIntersecting) {
								navLinks.forEach(link => link.classList.remove('active'));
								const active = navList.querySelector(`[data-slug="${entry.target.id}"]`);
								if (active) active.classList.add('active');
							}
						});
					},
					{ rootMargin: '-10% 0px -80% 0px', threshold: 0 }
				);

				articles.forEach(a => observer.observe(a));

				// Activate first link by default
				if (navLinks.length) navLinks[0].classList.add('active');

			} catch (error) {
				container.innerHTML = `<p>Error loading notes. Ensure you are running a local web server.</p>`;
				console.error('Error fetching or processing notes:', error);
			}
		}

		document.addEventListener('DOMContentLoaded', loadNotes);
	</script>
</head>
<body>

	<header class="page-header">
		<div class="header-inner">
			<img src="tfd-icon.png" alt="T4D logo" class="site-logo">
			<h1>Programming Notes</h1>
		</div>
		<p>A running log of snippets and technical discoveries.</p>
	</header>

	<div class="layout">

		<aside class="sidebar">
			<p class="sidebar-title">Posts</p>
			<ul class="sidebar-nav" id="sidebar-nav">
				<!-- populated by JS -->
			</ul>
		</aside>

		<main id="notes-container">
			<p>Loading entries…</p>
		</main>

	</div>

	<footer>
		<p>&copy; 2026 Personal Dev Notes.</p>
	</footer>

</body>
</html>
